<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analyse swing STM</title>

<!-- Open Graph (Facebook / LinkedIn) -->
<meta property="og:title" content="Analyse swing STM - Simulateur golf">
<meta property="og:description" content="Teste tes distances, apex et trajectoire selon tes paramètres de swing">
<meta property="og:image" content="https://ldj23.github.io/Distances-possibles-Golf/preview.png">
<meta property="og:url" content="https://ldj23.github.io/Distances-possibles-Golf/">
<meta name="twitter:card" content="summary_large_image">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  margin: 0;
  padding: 10px;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
}

.slider-container {
  margin-bottom: 12px;
}

label {
  font-size: 14px;
}

input[type=range] {
  width: 100%;
}

select {
  width: 100%;
  padding: 6px;
  border-radius: 6px;
  border: none;
  margin-top: 4px;
}

.result {
  margin-top: 15px;
  padding: 12px;
  background: #1e293b;
  border-radius: 10px;
}

.value {
  font-weight: bold;
  color: #f97316;
}
</style>
</head>

<body>
<div class="container">

<div class="slider-container">
<label>Club Speed: <span id="clubSpeedVal">95</span> mph</label>
<input type="range" id="clubSpeed" min="60" max="120" value="95">
</div>

<div class="slider-container">
<label>Ball Speed: <span id="ballSpeedVal">140</span> mph</label>
<input type="range" id="ballSpeed" min="80" max="190" value="140">
</div>

<div class="slider-container">
<label>Launch Angle (VLA): <span id="launchVal">14</span>°</label>
<input type="range" id="launch" min="5" max="25" value="14">
</div>

<div class="slider-container">
<label>Club</label>
<select id="club">
  <option value="driver">Driver</option>
  <option value="3w">3 Wood</option>
  <option value="7w">7 Wood</option>
  <option value="4h">4 Hybrid</option>
  <option value="5i">5 Iron</option>
  <option value="7i">7 Iron</option>
  <option value="pw">PW</option>
</select>
</div>

<div class="result">
<div>Carry: <span class="value" id="carry">0</span> verges</div>
<div>Total: <span class="value" id="total">0</span> verges</div>
<div>Apex: <span class="value" id="apex">0</span> pieds</div>
</div>

</div>

<script>
const clubSpeed = document.getElementById("clubSpeed");
const ballSpeed = document.getElementById("ballSpeed");
const launch = document.getElementById("launch");
const club = document.getElementById("club");

const clubSpeedVal = document.getElementById("clubSpeedVal");
const ballSpeedVal = document.getElementById("ballSpeedVal");
const launchVal = document.getElementById("launchVal");

function update() {
  clubSpeedVal.textContent = clubSpeed.value;
  ballSpeedVal.textContent = ballSpeed.value;
  launchVal.textContent = launch.value;

  let bs = parseFloat(ballSpeed.value);
  let la = parseFloat(launch.value);

  // Carry approximation
  let carry = (bs * bs * Math.sin(2 * la * Math.PI / 180)) / 32;

  // Adjust by club type
  let multiplier = {
    driver: 1,
    "3w": 0.95,
    "7w": 0.9,
    "4h": 0.88,
    "5i": 0.85,
    "7i": 0.8,
    "pw": 0.7
  }[club.value];

  carry = carry * multiplier;

  let total = carry * 1.15;

  // Apex approximation (réaliste simplifié)
  let apex = (bs * Math.sin(la * Math.PI / 180)) ** 2 / 64;

  document.getElementById("carry").textContent = Math.round(carry);
  document.getElementById("total").textContent = Math.round(total);
  document.getElementById("apex").textContent = Math.round(apex);
}

clubSpeed.oninput = update;
ballSpeed.oninput = update;
launch.oninput = update;
club.onchange = update;

update();
</script>

</body>
</html>
