<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Analyse swing STM</title>

  <meta property="og:title" content="Analyse swing STM - Simulateur golf">
  <meta property="og:description" content="Teste tes distances, apex et trajectoire selon tes paramètres de swing">
  <meta property="og:image" content="https://ldj23.github.io/Distances-possibles-Golf/preview.png">
  <meta property="og:url" content="https://ldj23.github.io/Distances-possibles-Golf/">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: #f8fafc;
    }

    .app {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 12px 18px;
    }

    .card {
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 18px;
      padding: 14px 12px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .title {
      font-size: 1.15rem;
      font-weight: 800;
      text-align: center;
      margin: 0 0 12px;
      letter-spacing: 0.2px;
    }

    .control {
      margin-bottom: 12px;
    }

    .control:last-of-type {
      margin-bottom: 10px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      gap: 10px;
    }

    .label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    .inline-value {
      font-size: 0.9rem;
      font-weight: 800;
      color: #fb923c;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 999px;
      background: #334155;
      outline: none;
      margin: 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #f97316;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #f97316;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      cursor: pointer;
    }

    select {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 0.95rem;
      font-weight: 700;
      background: #0f172a;
      color: #f8fafc;
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .results {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .result-box {
      background: #0f172a;
      border-radius: 14px;
      padding: 11px 12px;
      border: 1px solid rgba(148, 163, 184, 0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-label {
      font-size: 0.92rem;
      font-weight: 700;
      color: #cbd5e1;
    }

    .result-value {
      font-size: 1.02rem;
      font-weight: 900;
      color: #fb923c;
    }

    .credits {
      margin-top: 10px;
      text-align: center;
      font-size: 0.72rem;
      color: #94a3b8;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1 class="title">Analyse swing STM</h1>

      <div class="control">
        <div class="label-row">
          <div class="label">Club Speed</div>
          <div class="inline-value"><span id="clubSpeedVal">95</span> mph</div>
        </div>
        <input type="range" id="clubSpeed" min="60" max="120" value="95" />
      </div>

      <div class="control">
        <div class="label-row">
          <div class="label">Ball Speed</div>
          <div class="inline-value"><span id="ballSpeedVal">140</span> mph</div>
        </div>
        <input type="range" id="ballSpeed" min="80" max="190" value="140" />
      </div>

      <div class="control">
        <div class="label-row">
          <div class="label">Launch Angle (VLA)</div>
          <div class="inline-value"><span id="launchVal">14</span>°</div>
        </div>
        <input type="range" id="launch" min="5" max="25" value="14" />
      </div>

      <div class="control">
        <div class="label-row">
          <div class="label">Club</div>
        </div>
        <select id="club">
          <option value="driver">Driver</option>
          <option value="3w">3 Wood</option>
          <option value="7w">7 Wood</option>
          <option value="4h">4 Hybrid</option>
          <option value="5i">5 Iron</option>
          <option value="7i">7 Iron</option>
          <option value="pw">PW</option>
        </select>
      </div>

      <div class="results">
        <div class="result-box">
          <div class="result-label">Carry</div>
          <div class="result-value"><span id="carry">0</span> verges</div>
        </div>

        <div class="result-box">
          <div class="result-label">Total</div>
          <div class="result-value"><span id="total">0</span> verges</div>
        </div>

        <div class="result-box">
          <div class="result-label">Apex</div>
          <div class="result-value"><span id="apex">0</span> pieds</div>
        </div>
      </div>

      <div class="credits">Crédits: Louis-Daniel Joly</div>
    </div>
  </div>

  <script>
    const clubSpeed = document.getElementById("clubSpeed");
    const ballSpeed = document.getElementById("ballSpeed");
    const launch = document.getElementById("launch");
    const club = document.getElementById("club");

    const clubSpeedVal = document.getElementById("clubSpeedVal");
    const ballSpeedVal = document.getElementById("ballSpeedVal");
    const launchVal = document.getElementById("launchVal");

    const carryEl = document.getElementById("carry");
    const totalEl = document.getElementById("total");
    const apexEl = document.getElementById("apex");

    function update() {
      const cs = parseFloat(clubSpeed.value);
      const bs = parseFloat(ballSpeed.value);
      const la = parseFloat(launch.value);
      const selectedClub = club.value;

      clubSpeedVal.textContent = cs;
      ballSpeedVal.textContent = bs;
      launchVal.textContent = la;

      let carry = (bs * bs * Math.sin((2 * la * Math.PI) / 180)) / 32;

      const multiplier = {
        driver: 1,
        "3w": 0.95,
        "7w": 0.90,
        "4h": 0.88,
        "5i": 0.85,
        "7i": 0.80,
        "pw": 0.70
      }[selectedClub];

      carry = carry * multiplier;
      const total = carry * 1.15;
      const apex = Math.pow(bs * Math.sin((la * Math.PI) / 180), 2) / 64;

      carryEl.textContent = Math.round(carry);
      totalEl.textContent = Math.round(total);
      apexEl.textContent = Math.round(apex);
    }

    clubSpeed.addEventListener("input", update);
    ballSpeed.addEventListener("input", update);
    launch.addEventListener("input", update);
    club.addEventListener("change", update);

    update();
  </script>
</body>
</html>
