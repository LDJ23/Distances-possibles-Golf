<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analyse swing STM</title>

<!-- Open Graph -->
<meta property="og:title" content="Analyse swing STM - Simulateur golf">
<meta property="og:description" content="Teste tes distances, apex et trajectoire selon tes paramètres de swing">
<meta property="og:image" content="https://ldj23.github.io/Distances-possibles-Golf/preview.png">
<meta property="og:url" content="https://ldj23.github.io/Distances-possibles-Golf/">
<meta name="twitter:card" content="summary_large_image">

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(180deg,#061a2d,#0b2f4f);
color:white;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:420px;
padding:12px;
}

h1{
text-align:center;
font-size:22px;
margin-bottom:8px;
}

.subtitle{
text-align:center;
font-size:12px;
opacity:.7;
margin-bottom:10px;
}

.clubs{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-bottom:10px;
}

.club-btn{
padding:10px;
border-radius:12px;
border:1px solid rgba(255,255,255,.2);
text-align:center;
font-size:13px;
cursor:pointer;
}

.club-btn.active{
background:#2b6cb0;
}

.slider-box{
background:rgba(255,255,255,.05);
padding:10px;
border-radius:14px;
margin-bottom:8px;
}

.slider-label{
display:flex;
justify-content:space-between;
font-size:13px;
margin-bottom:4px;
}

input[type=range]{
width:100%;
}

.results{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

.card{
padding:14px;
border-radius:16px;
text-align:center;
background:rgba(255,255,255,.05);
}

.card.gold{
background:linear-gradient(145deg,#3a2a12,#8b5e1a);
}

.card.warn{
outline:2px solid #ff6b6b;
}

.value{
font-size:24px;
font-weight:bold;
}

.comment{
margin-top:10px;
padding:10px;
border-radius:12px;
background:rgba(0,255,180,.1);
font-size:13px;
}

.footer{
margin-top:10px;
font-size:11px;
opacity:.6;
text-align:center;
}
</style>
</head>

<body>
<div class="container">

<h1>Analyse swing STM</h1>
<div class="subtitle">Simulateur pédagogique basé sur TrackMan</div>

<div class="clubs">
<div class="club-btn active" data-club="driver">Driver</div>
<div class="club-btn" data-club="3w">3W</div>
<div class="club-btn" data-club="5w">5W</div>
<div class="club-btn" data-club="7w">7W</div>
<div class="club-btn" data-club="4h">H4</div>
<div class="club-btn" data-club="5h">H5</div>
<div class="club-btn" data-club="4i">4I</div>
<div class="club-btn" data-club="5i">5I</div>
<div class="club-btn" data-club="6i">6I</div>
<div class="club-btn" data-club="7i">7I</div>
<div class="club-btn" data-club="8i">8I</div>
<div class="club-btn" data-club="9i">9I</div>
<div class="club-btn" data-club="pw">PW</div>
<div class="club-btn" data-club="sw">SW</div>
</div>

<div class="slider-box">
<div class="slider-label">Club speed <span id="csVal">95</span> mph</div>
<input type="range" id="cs" min="60" max="110" value="95">
</div>

<div class="slider-box">
<div class="slider-label">Ball speed <span id="bsVal">140</span> mph</div>
<input type="range" id="bs" min="80" max="180" value="140">
</div>

<div class="slider-box">
<div class="slider-label">Launch angle <span id="laVal">13</span>°</div>
<input type="range" id="la" min="5" max="35" value="13">
</div>

<div class="results">
<div class="card gold" id="carryCard">
<div>CARRY</div>
<div class="value" id="carry">0</div>
<div>verges</div>
</div>

<div class="card gold" id="totalCard">
<div>TOTAL</div>
<div class="value" id="total">0</div>
<div>verges</div>
</div>

<div class="card gold" id="apexCard">
<div>APEX</div>
<div class="value" id="apex">0</div>
<div>pieds</div>
</div>

<div class="card" id="smashCard">
<div>SMASH</div>
<div class="value" id="smash">0</div>
<div>ratio</div>
</div>
</div>

<div class="comment" id="comment"></div>

<div class="footer">
Crédits: Louis-Daniel Joly
</div>

</div>

<script>

const data={
driver:{cs:94,bs:140,la:13,carry:218,apex:75,smash:1.48,roll:25},
"3w":{cs:90,bs:132,la:11,carry:195,apex:70,smash:1.48,roll:18},
"5w":{cs:88,bs:128,la:12,carry:185,apex:78,smash:1.47,roll:14},
"7w":{cs:85,bs:123,la:13,carry:174,apex:75,smash:1.46,roll:10},
"4h":{cs:84,bs:121,la:14,carry:176,apex:72,smash:1.44,roll:8},
"5h":{cs:81,bs:116,la:15,carry:166,apex:70,smash:1.43,roll:6},
"4i":{cs:80,bs:116,la:14,carry:169,apex:72,smash:1.45,roll:5},
"5i":{cs:79,bs:112,la:15,carry:161,apex:70,smash:1.43,roll:4},
"6i":{cs:78,bs:109,la:17,carry:152,apex:75,smash:1.41,roll:3},
"7i":{cs:76,bs:104,la:19,carry:141,apex:78,smash:1.38,roll:2},
"8i":{cs:74,bs:100,la:21,carry:130,apex:75,smash:1.33,roll:2},
"9i":{cs:72,bs:93,la:24,carry:119,apex:78,smash:1.32,roll:1},
pw:{cs:70,bs:86,la:26,carry:107,apex:70,smash:1.28,roll:1},
sw:{cs:62,bs:72,la:30,carry:86,apex:65,smash:1.16,roll:1}
}

let club="driver"

document.querySelectorAll(".club-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".club-btn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
club=btn.dataset.club
update()
}
})

const cs=document.getElementById("cs")
const bs=document.getElementById("bs")
const la=document.getElementById("la")

cs.oninput=bs.oninput=la.oninput=update

function update(){

let d=data[club]

let csV=+cs.value
let bsV=+bs.value
let laV=+la.value

document.getElementById("csVal").innerText=csV
document.getElementById("bsVal").innerText=bsV
document.getElementById("laVal").innerText=laV

let smash=(bsV/csV).toFixed(2)

let carry=d.carry*(bsV/d.bs)*(1-Math.abs(laV-d.la)*0.01)
let total=carry+d.roll
let apex=d.apex+(laV-d.la)*2

document.getElementById("carry").innerText=Math.round(carry)
document.getElementById("total").innerText=Math.round(total)
document.getElementById("apex").innerText=Math.round(apex)
document.getElementById("smash").innerText=smash

// reset warnings
document.querySelectorAll(".card").forEach(c=>c.classList.remove("warn"))

// logique visuelle FIX
if(Math.abs(laV-d.la)>4) document.getElementById("apexCard").classList.add("warn")
if(Math.abs(smash-d.smash)>0.08) document.getElementById("smashCard").classList.add("warn")

document.getElementById("comment").innerText=
smash>1.45?"🔥 Smash excellent":
smash>1.35?"👍 Bon contact":
"⚠️ Smash faible"

}

update()

</script>

</body>
</html>
