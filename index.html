<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analyse swing STM</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f2a1c;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:100%;
max-width:420px;
padding:10px;
}

h1{
margin:0;
font-size:24px;
}

.mode{
font-size:12px;
margin-bottom:8px;
color:#ccc;
}

.club-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-bottom:6px;
}

.club-btn{
padding:8px;
border:none;
border-radius:10px;
background:#1f3d2b;
color:white;
font-weight:bold;
}

.club-btn.active{
background:#3c7a4c;
}

.slider{
margin-bottom:6px;
}

.value{
float:right;
color:#d8c08d;
}

.metric{
background:#1f3d2b;
padding:10px;
border-radius:10px;
text-align:center;
margin:4px;
}

.metric.warning{
background:#5c3b1a;
}

.metrics{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.tip{
font-size:12px;
margin-top:4px;
padding:6px;
border-radius:8px;
background:#1f3d2b;
}
</style>
</head>

<body>
<div class="app">

<h1>Analyse swing STM</h1>
<div class="mode">Ajuste les curseurs et analyse carry, apex et smash</div>

<div class="club-grid" id="clubGrid"></div>

<div class="slider">
Club speed <span class="value" id="csVal"></span>
<input type="range" id="cs" min="60" max="120">
</div>

<div class="slider">
Ball speed <span class="value" id="bsVal"></span>
<input type="range" id="bs" min="80" max="185">
</div>

<div class="slider">
VLA <span class="value" id="vlaVal"></span>
<input type="range" id="vla" min="5" max="30" step="0.1">
</div>

<div class="metrics">
<div class="metric"><div>Carry</div><div id="carry"></div></div>
<div class="metric"><div>Total</div><div id="total"></div></div>
<div class="metric" id="apexBox"><div>Apex</div><div id="apex"></div></div>
<div class="metric" id="smashBox"><div>Smash</div><div id="smash"></div></div>
</div>

<div class="tip" id="tip"></div>
<div class="tip" id="smashTip"></div>

</div>

<script>
const SMASH_CAP = 1.50;

const clubs = [
{label:"Driver", cs:94, bs:140, launch:13, apex:100, carry:218, roll:18},
{label:"3W", cs:90, bs:132, launch:11, apex:80, carry:195, roll:14},
{label:"7W", cs:85, bs:123, launch:13, apex:90, carry:174, roll:9},
{label:"4H", cs:83, bs:120, launch:14, apex:85, carry:171, roll:8},
{label:"5H", cs:81, bs:117, launch:14, apex:90, carry:166, roll:7},
{label:"F4", cs:80, bs:116, launch:14, apex:75, carry:169, roll:7},
{label:"F5", cs:79, bs:112, launch:15, apex:80, carry:161, roll:6},
{label:"F6", cs:78, bs:109, launch:17, apex:85, carry:152, roll:5},
{label:"F7", cs:76, bs:104, launch:19, apex:90, carry:141, roll:4},
{label:"F8", cs:74, bs:100, launch:21, apex:95, carry:130, roll:3},
{label:"F9", cs:72, bs:93, launch:24, apex:100, carry:119, roll:2},
{label:"PW", cs:70, bs:86, launch:26, apex:95, carry:107, roll:1}
];

let club = clubs[8];

const grid = document.getElementById("clubGrid");
clubs.forEach(c=>{
let b=document.createElement("button");
b.innerText=c.label;
b.className="club-btn";
b.onclick=()=>{
club=c;
cs.value=c.cs;
bs.value=c.bs;
vla.value=c.launch;
update();
};
grid.appendChild(b);
});

const cs=document.getElementById("cs");
const bs=document.getElementById("bs");
const vla=document.getElementById("vla");

function update(){

let csVal=Number(cs.value);
let bsVal=Math.min(Number(bs.value), csVal*SMASH_CAP);
bs.value=bsVal;

let smash=bsVal/csVal;

let carry=club.carry*Math.pow(bsVal/club.bs,1.7);
let total=carry+club.roll;

let apex=club.apex
*Math.pow(csVal/club.cs,1.1)
*(1+(vla.value-club.launch)*0.02)
*Math.pow(bsVal/club.bs,0.3);

apex=Math.round(apex);

document.getElementById("csVal").innerText=csVal+" mph";
document.getElementById("bsVal").innerText=bsVal+" mph";
document.getElementById("vlaVal").innerText=vla.value+"°";

document.getElementById("carry").innerText=Math.round(carry);
document.getElementById("total").innerText=Math.round(total);
document.getElementById("apex").innerText=apex;
document.getElementById("smash").innerText=smash.toFixed(2);

let apexBox=document.getElementById("apexBox");
let smashBox=document.getElementById("smashBox");

apexBox.classList.remove("warning");
smashBox.classList.remove("warning");

if(smash<1.3 || smash>1.5) smashBox.classList.add("warning");

let idealApex=club.apex*Math.pow(csVal/club.cs,1.1);

if(apex<idealApex*0.9 || apex>idealApex*1.1){
apexBox.classList.add("warning");
}

document.getElementById("tip").innerText="Fenêtre idéale autour de "+club.launch+"°";
document.getElementById("smashTip").innerText="Smash idéal proche de 1.45";
}

cs.oninput=update;
bs.oninput=update;
vla.oninput=update;

cs.value=club.cs;
bs.value=club.bs;
vla.value=club.launch;

update();
</script>

</body>
</html>
