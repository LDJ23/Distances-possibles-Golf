<script>
  const SMASH_CAP = 1.50;

  const clubs = [
    { key:"driver", label:"Driver", clubSpeed:94, ballSpeed:140, smashIdeal:1.48, smashMax:1.50, launch:13.2, apexBase:95, carry:218, roll:18, apexMin:75, apexMax:120 },
    { key:"3w",    label:"3W",     clubSpeed:90, ballSpeed:132, smashIdeal:1.48, smashMax:1.50, launch:11.2, apexBase:78, carry:195, roll:14, apexMin:60, apexMax:95  },
    { key:"7w",    label:"7W",     clubSpeed:85, ballSpeed:123, smashIdeal:1.46, smashMax:1.49, launch:12.7, apexBase:84, carry:174, roll:9,  apexMin:68, apexMax:102 },
    { key:"4h",    label:"4H",     clubSpeed:83, ballSpeed:120, smashIdeal:1.45, smashMax:1.48, launch:13.4, apexBase:82, carry:171, roll:8,  apexMin:66, apexMax:98  },
    { key:"5h",    label:"5H",     clubSpeed:81, ballSpeed:117, smashIdeal:1.44, smashMax:1.47, launch:14.0, apexBase:86, carry:166, roll:7,  apexMin:68, apexMax:102 },
    { key:"4i",    label:"F4",     clubSpeed:80, ballSpeed:116, smashIdeal:1.45, smashMax:1.47, launch:14.3, apexBase:72, carry:169, roll:7,  apexMin:58, apexMax:88  },
    { key:"5i",    label:"F5",     clubSpeed:79, ballSpeed:112, smashIdeal:1.43, smashMax:1.45, launch:14.8, apexBase:78, carry:161, roll:6,  apexMin:62, apexMax:94  },
    { key:"6i",    label:"F6",     clubSpeed:78, ballSpeed:109, smashIdeal:1.41, smashMax:1.43, launch:17.1, apexBase:84, carry:152, roll:5,  apexMin:68, apexMax:100 },
    { key:"7i",    label:"F7",     clubSpeed:76, ballSpeed:104, smashIdeal:1.38, smashMax:1.40, launch:19.0, apexBase:90, carry:141, roll:4,  apexMin:72, apexMax:106 },
    { key:"8i",    label:"F8",     clubSpeed:74, ballSpeed:100, smashIdeal:1.33, smashMax:1.35, launch:20.8, apexBase:94, carry:130, roll:3,  apexMin:76, apexMax:110 },
    { key:"9i",    label:"F9",     clubSpeed:72, ballSpeed:93,  smashIdeal:1.32, smashMax:1.34, launch:23.9, apexBase:98, carry:119, roll:2,  apexMin:80, apexMax:114 },
    { key:"pw",    label:"PW",     clubSpeed:70, ballSpeed:86,  smashIdeal:1.28, smashMax:1.30, launch:25.7, apexBase:92, carry:107, roll:1,  apexMin:76, apexMax:108 }
  ];

  const clubGrid = document.getElementById("clubGrid");
  const clubSpeed = document.getElementById("clubSpeed");
  const ballSpeed = document.getElementById("ballSpeed");
  const vla = document.getElementById("vla");

  const clubSpeedValue = document.getElementById("clubSpeedValue");
  const ballSpeedValue = document.getElementById("ballSpeedValue");
  const vlaValue = document.getElementById("vlaValue");

  const carryValue = document.getElementById("carryValue");
  const totalValue = document.getElementById("totalValue");
  const apexValue = document.getElementById("apexValue");
  const smashValue = document.getElementById("smashValue");

  const tipBox = document.getElementById("tipBox");
  const smashComment = document.getElementById("smashComment");
  const apexComment = document.getElementById("apexComment");

  let selectedClub = clubs.find(c => c.key === "7i");

  function clamp(value, min, max){
    return Math.min(max, Math.max(min, value));
  }

  function renderClubs(){
    clubGrid.innerHTML = "";
    clubs.forEach((club) => {
      const btn = document.createElement("button");
      btn.className = "club-btn" + (club.key === selectedClub.key ? " active" : "");
      btn.textContent = club.label;
      btn.addEventListener("click", () => {
        selectedClub = club;
        setInputsFromClub(club);
        renderClubs();
        updateDisplay();
      });
      clubGrid.appendChild(btn);
    });
  }

  function setInputsFromClub(club){
    clubSpeed.value = Math.round(club.clubSpeed);
    ballSpeed.value = Math.round(club.ballSpeed);
    vla.value = club.launch.toFixed(1);
  }

  function autoBallSpeedFromClubSpeed(){
    const cs = Number(clubSpeed.value);
    const suggested = Math.round(cs * selectedClub.smashIdeal);
    ballSpeed.value = Math.min(suggested, Math.round(cs * SMASH_CAP));
  }

  function enforceSmashCap(){
    const cs = Number(clubSpeed.value);
    const maxBallSpeed = Math.round(cs * SMASH_CAP);
    if (Number(ballSpeed.value) > maxBallSpeed) {
      ballSpeed.value = maxBallSpeed;
    }
  }

  function computeSmash(){
    const cs = Number(clubSpeed.value);
    const bs = Number(ballSpeed.value);
    if (cs <= 0) return 0;
    return Math.min(bs / cs, SMASH_CAP);
  }

  function computeCarry(bs, launch){
    const bsRatio = bs / selectedClub.ballSpeed;
    const launchDelta = launch - selectedClub.launch;

    let carry = selectedClub.carry * Math.pow(bsRatio, 1.72);
    const launchFactor = 1 - (0.0032 * Math.pow(launchDelta, 2));
    carry *= clamp(launchFactor, 0.90, 1.03);

    return Math.round(Math.max(20, carry));
  }

  function getSpeedApexFactor(cs, refCs, clubKey){
    const ratio = cs / refCs;

    let exponent = 1.05;

    if (clubKey === "driver") exponent = 1.18;
    else if (["3w", "7w", "4h", "5h"].includes(clubKey)) exponent = 1.12;
    else if (["4i", "5i", "6i"].includes(clubKey)) exponent = 1.08;
    else exponent = 1.04;

    return Math.pow(ratio, exponent);
  }

  function computeApexFeet(bs, launch){
    const cs = Number(clubSpeed.value);
    const bsRatio = bs / selectedClub.ballSpeed;
    const launchDelta = launch - selectedClub.launch;

    let apexFeet = selectedClub.apexBase;

    const speedFactor = getSpeedApexFactor(cs, selectedClub.clubSpeed, selectedClub.key);
    apexFeet *= speedFactor;

    apexFeet *= Math.pow(bsRatio, 0.35);

    apexFeet *= (1 + (launchDelta * 0.022));

    apexFeet = clamp(apexFeet, selectedClub.apexMin, selectedClub.apexMax);

    return Math.round(apexFeet);
  }

  function computeTotal(carry, launch){
    const launchDelta = launch - selectedClub.launch;

    let roll = selectedClub.roll;
    roll -= launchDelta * 0.45;
    roll = clamp(roll, 0, selectedClub.roll + 5);

    return Math.round(carry + roll);
  }

  function buildLaunchTip(launch){
    const ideal = selectedClub.launch;
    const gap = launch - ideal;

    if (Math.abs(gap) <= 1.0) {
      tipBox.className = "tip ok";
      tipBox.innerHTML = `<strong>Fenêtre :</strong> très bonne pour ${selectedClub.label}. Tu es proche de ${ideal.toFixed(1)}°.`;
    } else if (gap < -1.0) {
      tipBox.className = "tip warn";
      tipBox.innerHTML = `<strong>Fenêtre :</strong> launch un peu bas pour ${selectedClub.label}. Référence ≈ ${ideal.toFixed(1)}°.`;
    } else {
      tipBox.className = "tip warn";
      tipBox.innerHTML = `<strong>Fenêtre :</strong> launch un peu haut pour ${selectedClub.label}. Référence ≈ ${ideal.toFixed(1)}°.`;
    }
  }

  function buildSmashComment(smash){
    const ideal = selectedClub.smashIdeal;
    const max = Math.min(selectedClub.smashMax, SMASH_CAP);

    if (smash >= max - 0.01) {
      smashComment.className = "tip warn";
      smashComment.innerHTML = `<strong>Smash :</strong> ${smash.toFixed(2)} au plafond réaliste pour ${selectedClub.label}.`;
    } else if (smash >= ideal - 0.03 && smash <= ideal + 0.02) {
      smashComment.className = "tip ok";
      smashComment.innerHTML = `<strong>Smash :</strong> ${smash.toFixed(2)} cohérent pour ${selectedClub.label}.`;
    } else if (smash >= ideal - 0.08) {
      smashComment.className = "tip info";
      smashComment.innerHTML = `<strong>Smash :</strong> ${smash.toFixed(2)} correct, mais un peu sous la référence.`;
    } else {
      smashComment.className = "tip warn";
      smashComment.innerHTML = `<strong>Smash :</strong> ${smash.toFixed(2)} faible. Perte d’énergie probable au contact.`;
    }
  }

  function buildApexComment(apexFeet){
    const cs = Number(clubSpeed.value);
    const target = Math.round(selectedClub.apexBase * getSpeedApexFactor(cs, selectedClub.clubSpeed, selectedClub.key));
    const lowBound = Math.round(target * 0.90);
    const highBound = Math.round(target * 1.10);

    if (apexFeet >= lowBound && apexFeet <= highBound) {
      apexComment.className = "tip ok";
      apexComment.innerHTML = `<strong>Apex :</strong> très bon pour ${selectedClub.label}. Cible dynamique ≈ ${target} pieds.`;
    } else if (apexFeet < lowBound) {
      apexComment.className = "tip warn";
      apexComment.innerHTML = `<strong>Apex :</strong> un peu bas pour ${selectedClub.label}. Cible dynamique ≈ ${target} pieds.`;
    } else {
      apexComment.className = "tip warn";
      apexComment.innerHTML = `<strong>Apex :</strong> un peu haut pour ${selectedClub.label}. Cible dynamique ≈ ${target} pieds.`;
    }
  }

  function updateDisplay(){
    const cs = Number(clubSpeed.value);
    enforceSmashCap();

    const bs = Number(ballSpeed.value);
    const launch = Number(vla.value);

    const smash = computeSmash();
    const carry = computeCarry(bs, launch);
    const total = computeTotal(carry, launch);
    const apexFeet = computeApexFeet(bs, launch);

    clubSpeedValue.textContent = `${cs} mph`;
    ballSpeedValue.textContent = `${bs} mph`;
    vlaValue.textContent = `${launch.toFixed(1)}°`;

    carryValue.textContent = carry;
    totalValue.textContent = total;
    apexValue.textContent = apexFeet;
    smashValue.textContent = smash.toFixed(2);

    buildLaunchTip(launch);
    buildSmashComment(smash);
    buildApexComment(apexFeet);
  }

  clubSpeed.addEventListener("input", () => {
    autoBallSpeedFromClubSpeed();
    updateDisplay();
  });

  ballSpeed.addEventListener("input", () => {
    enforceSmashCap();
    updateDisplay();
  });

  vla.addEventListener("input", updateDisplay);

  setInputsFromClub(selectedClub);
  renderClubs();
  updateDisplay();
</script>
